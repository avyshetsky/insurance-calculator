# Datasource
spring.datasource.url=jdbc:h2:mem:insurancedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.platform=h2
spring.h2.console.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# OTel
otel.service.name=${OTEL_SERVICE_NAME:insurance-calculator}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:grpc}

# JSON logging in production
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
